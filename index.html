<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q2D · Dependency Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font-body);font-size:14px;color:var(--fg-default);background:var(--bg-page);-webkit-font-smoothing:antialiased}
#root{display:flex;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--neutral-300);border-radius:3px}
.dtbl{width:100%;border-collapse:collapse;font-size:13px}
.dtbl th{padding:10px 14px;text-align:left;background:var(--bg-warm);font-family:var(--font-display);font-size:10px;letter-spacing:.10em;text-transform:uppercase;font-weight:700;border-bottom:1px solid var(--border-default);white-space:nowrap;cursor:pointer;user-select:none}
.dtbl th:hover{background:var(--neutral-200)}
.dtbl td{padding:10px 14px;border-bottom:1px solid var(--border-subtle);vertical-align:middle}
.dtbl tbody tr:hover td{background:var(--neutral-50)}
.dtbl tbody tr:last-child td{border-bottom:none}
.ff{display:flex;flex-direction:column;gap:6px}
.ff label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-muted)}
.ff input,.ff select,.ff textarea{font-family:var(--font-body);font-size:13px;padding:8px 10px;border:1px solid var(--border-default);background:#fff;color:var(--fg-default);border-radius:2px;outline:none;transition:border-color 120ms,box-shadow 120ms;width:100%}
.ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--secil-yellow);box-shadow:var(--shadow-focus)}
.ff textarea{resize:vertical;min-height:68px}
@keyframes fadeUp{from{transform:translateY(4px)}to{transform:none}}
.au{animation:fadeUp 180ms cubic-bezier(0.22,1,0.36,1) both}
.btn-ic{background:none;border:none;cursor:pointer;padding:4px;display:inline-flex;align-items:center;border-radius:2px;transition:color 120ms}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;
const TODAY = new Date().toISOString().slice(0, 10);

const PHASES = [
  { id:'P1', name:'Quarry Raw Material Management',                  short:'Quarry' },
  { id:'P2', name:'Quality KPI Monitoring',                          short:'Quality KPI' },
  { id:'P3', name:'Clinker KPI Monitoring & Team Optimisation',      short:'Clinker KPI' },
  { id:'P4', name:'Additives Management',                            short:'Additives' },
  { id:'P5', name:'Packaging Performance Monitoring',                short:'Packaging' },
  { id:'P6', name:'Clinker Emissions & Environmental Performance',   short:'Emissions' },
];
const PHASE_COLORS = ['#FCB809','#44A3BA','#258F59','#FC9053','#C0392B','#4D4A40'];
const PRIORITIES = ['Low','Medium','High','Critical'];
const STATUSES   = ['Open','In Progress','In Review','Resolved'];

// ── HELPERS ───────────────────────────────────────────────────
const isOverdue = d => d.status !== 'Resolved' && d.dueDate && d.dueDate < TODAY;
const fmtDate   = d => { if (!d) return '—'; const [y,m,day] = d.split('-'); return `${day}/${m}/${y}`; };
const nextId    = deps => 'D' + String(Math.max(0, ...deps.map(d => parseInt(d.id.slice(1))).filter(n => !isNaN(n))) + 1).padStart(3, '0');

function applyFilters(list, f) {
  return list.filter(d => {
    if (f.hideResolved && d.status === 'Resolved') return false;
    if (f.phase    && d.phase    !== f.phase)    return false;
    if (f.status   && d.status   !== f.status)   return false;
    if (f.priority && d.priority !== f.priority) return false;
    if (f.search) {
      const q = f.search.toLowerCase();
      return [d.blockedTask, d.blockedTeam, d.blockingTask, d.blockingTeam, d.notes, d.id]
        .some(v => (v || '').toLowerCase().includes(q));
    }
    return true;
  });
}

// ── ICON ──────────────────────────────────────────────────────
const ICONS = {
  list:      ['M8 6h13','M8 12h13','M8 18h13','M3 6h.01','M3 12h.01','M3 18h.01'],
  grid:      ['M3 3h7v7H3z','M14 3h7v7h-7z','M3 14h7v7H3z','M14 14h7v7h-7z'],
  users:     ['M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2','M9 11a4 4 0 100-8 4 4 0 000 8z','M23 21v-2a4 4 0 00-3-3.87','M16 3.13a4 4 0 010 7.75'],
  plus:      ['M12 5v14','M5 12h14'],
  download:  ['M12 3v12','M8 11l4 4 4-4','M4 17v3h16v-3'],
  upload:    ['M12 15V3','M8 7l4-4 4 4','M4 17v3h16v-3'],
  search:    ['M21 21l-4.3-4.3','M11 19a8 8 0 100-16 8 8 0 000 16z'],
  edit:      ['M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7','M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z'],
  trash:     ['M3 6h18','M8 6V4h8v2','M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6'],
  x:         ['M18 6L6 18','M6 6l12 12'],
  chevDown:  ['M6 9l6 6 6-6'],
  chevRight: ['M9 18l6-6-6-6'],
  sortAsc:   ['M12 19V5','M5 12l7-7 7 7'],
  sortDesc:  ['M12 5v14','M5 12l7 7 7-7'],
  alert:     ['M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z','M12 9v4','M12 17h.01'],
  check:     ['M20 6L9 17l-5-5'],
  link:      ['M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71','M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71'],
};
function Icon({ name, size=16, color='currentColor', style={} }) {
  const paths = ICONS[name] || [];
  return (
    <svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color}
         strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink:0, ...style }}>
      {paths.map((p, i) => <path key={i} d={p} />)}
    </svg>
  );
}

// ── BADGES ────────────────────────────────────────────────────
function PhaseBadge({ phase }) {
  const idx = PHASES.findIndex(p => p.id === phase);
  const color = PHASE_COLORS[idx] || '#9A9685';
  return (
    <span style={{ display:'inline-flex', fontWeight:700, fontSize:10, letterSpacing:'0.07em',
      textTransform:'uppercase', padding:'2px 7px', borderRadius:2,
      background: color + '22', color, fontFamily:'Manrope', whiteSpace:'nowrap' }}>
      {phase}
    </span>
  );
}

function StatusBadge({ status }) {
  const map = {
    'Open':        ['#F4F2EA', '#4D4A40'],
    'In Progress': ['rgba(224,168,0,0.14)', '#7A5E02'],
    'In Review':   ['rgba(68,163,186,0.15)', '#1F6E82'],
    'Resolved':    ['rgba(37,143,89,0.12)', '#1A6B41'],
  };
  const [bg, fg] = map[status] || map['Open'];
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:5, fontWeight:600, fontSize:10,
      letterSpacing:'0.04em', textTransform:'uppercase', padding:'3px 8px', borderRadius:2,
      background:bg, color:fg, whiteSpace:'nowrap' }}>
      <span style={{ width:5, height:5, borderRadius:'50%', background:'currentColor', flexShrink:0 }} />
      {status}
    </span>
  );
}

function PriorityBadge({ priority }) {
  const map = {
    'Low':      ['#F4F2EA', '#6F6C5E'],
    'Medium':   ['rgba(68,163,186,0.15)', '#1F6E82'],
    'High':     ['rgba(252,144,83,0.16)', '#B5471B'],
    'Critical': ['rgba(192,57,43,0.12)', '#922B21'],
  };
  const [bg, fg] = map[priority] || map['Low'];
  return (
    <span style={{ display:'inline-flex', fontWeight:600, fontSize:10, letterSpacing:'0.04em',
      textTransform:'uppercase', padding:'3px 8px', borderRadius:2,
      background:bg, color:fg, whiteSpace:'nowrap' }}>
      {priority}
    </span>
  );
}

// ── DEP TABLE ─────────────────────────────────────────────────
function DepTable({ deps, ownerMode, density, onEdit, onDelete, onView }) {
  const [sort, setSort] = useState({ col:'dueDate', dir:'asc' });
  const rowPad = density === 'compact' ? '7px 14px' : '11px 14px';

  const sorted = useMemo(() => {
    const priOrder = { Critical:0, High:1, Medium:2, Low:3 };
    const stOrder  = { 'Open':0, 'In Progress':1, 'In Review':2, 'Resolved':3 };
    return [...deps].sort((a, b) => {
      let va = a[sort.col] ?? '', vb = b[sort.col] ?? '';
      if (sort.col === 'priority') { va = priOrder[va] ?? 9; vb = priOrder[vb] ?? 9; }
      if (sort.col === 'status')   { va = stOrder[va]  ?? 9; vb = stOrder[vb]  ?? 9; }
      if (va < vb) return sort.dir === 'asc' ? -1 : 1;
      if (va > vb) return sort.dir === 'asc' ?  1 : -1;
      return 0;
    });
  }, [deps, sort]);

  const toggleSort = col =>
    setSort(s => s.col === col ? { col, dir: s.dir === 'asc' ? 'desc' : 'asc' } : { col, dir:'asc' });

  const SortIcon = ({ col }) => {
    if (sort.col !== col) return <Icon name="chevDown" size={11} color="var(--neutral-400)" />;
    return <Icon name={sort.dir === 'asc' ? 'sortAsc' : 'sortDesc'} size={11} color="var(--secil-yellow)" />;
  };

  const Th = ({ col, label, w }) => (
    <th onClick={() => toggleSort(col)} style={{ width: w }}>
      <span style={{ display:'inline-flex', alignItems:'center', gap:4 }}>
        {label}<SortIcon col={col} />
      </span>
    </th>
  );

  if (deps.length === 0) {
    return (
      <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
        padding:'60px 40px', gap:10, color:'var(--fg-subtle)' }}>
        <Icon name="search" size={28} color="var(--neutral-300)" />
        <span style={{ fontSize:14 }}>No dependencies match the current filters.</span>
      </div>
    );
  }

  return (
    <div style={{ overflowX:'auto' }}>
      <table className="dtbl">
        <thead>
          <tr>
            <Th col="id"           label="ID"            w={58}  />
            <Th col="blockedTask"  label="Blocked Task"          />
            <Th col="blockedTeam"  label="Blocked Team"  w={130} />
            <Th col="blockingTask" label="Blocking Task"         />
            <Th col="blockingTeam" label="Blocking Team" w={130} />
            <Th col="phase"        label="Phase"         w={66}  />
            <Th col="priority"     label="Priority"      w={88}  />
            <Th col="status"       label="Status"        w={110} />
            <Th col="dueDate"      label="Due Date"      w={100} />
            {ownerMode && <th style={{ width:68 }}></th>}
          </tr>
        </thead>
        <tbody>
          {sorted.map(dep => {
            const overdue = isOverdue(dep);
            return (
              <tr key={dep.id} className="au" style={{ cursor:'pointer' }} onClick={() => onView && onView(dep)}>
                <td style={{ fontFamily:'JetBrains Mono', fontSize:11, color:'var(--fg-subtle)',
                  fontVariantNumeric:'tabular-nums', padding:rowPad }}>
                  {dep.id}
                </td>
                <td style={{ padding:rowPad }}>
                  <span style={{ fontWeight:500, maxWidth:220, display:'block', textWrap:'pretty', lineHeight:1.35 }}>
                    {dep.blockedTask}
                  </span>
                </td>
                <td style={{ color:'var(--fg-muted)', fontSize:12, padding:rowPad }}>{dep.blockedTeam}</td>
                <td style={{ padding:rowPad }}>
                  <span style={{ color:'var(--fg-muted)', maxWidth:220, display:'block', textWrap:'pretty', lineHeight:1.35 }}>
                    {dep.blockingTask}
                  </span>
                </td>
                <td style={{ color:'var(--fg-muted)', fontSize:12, padding:rowPad }}>{dep.blockingTeam}</td>
                <td style={{ padding:rowPad }}><PhaseBadge phase={dep.phase} /></td>
                <td style={{ padding:rowPad }}><PriorityBadge priority={dep.priority} /></td>
                <td style={{ padding:rowPad }}><StatusBadge status={dep.status} /></td>
                <td style={{ padding:rowPad }}>
                  <span style={{ display:'inline-flex', alignItems:'center', gap:5,
                    fontFamily:'JetBrains Mono', fontSize:11,
                    color: overdue ? 'var(--secil-red)' : 'var(--fg-muted)',
                    fontVariantNumeric:'tabular-nums' }}>
                    {overdue && <Icon name="alert" size={12} color="var(--secil-red)" />}
                    {fmtDate(dep.dueDate)}
                  </span>
                </td>
                {ownerMode && (
                  <td style={{ padding:rowPad }} onClick={e => e.stopPropagation()}>
                    <div style={{ display:'flex', gap:2, justifyContent:'flex-end' }}>
                      <button className="btn-ic" title="Edit" onClick={() => onEdit(dep)}
                        style={{ color:'var(--fg-subtle)' }}
                        onMouseEnter={e => e.currentTarget.style.color = 'var(--fg-default)'}
                        onMouseLeave={e => e.currentTarget.style.color = 'var(--fg-subtle)'}>
                        <Icon name="edit" size={14} color="currentColor" />
                      </button>
                      <button className="btn-ic" title="Delete" onClick={() => onDelete(dep.id)}
                        style={{ color:'var(--fg-subtle)' }}
                        onMouseEnter={e => e.currentTarget.style.color = 'var(--secil-red)'}
                        onMouseLeave={e => e.currentTarget.style.color = 'var(--fg-subtle)'}>
                        <Icon name="trash" size={14} color="currentColor" />
                      </button>
                    </div>
                  </td>
                )}
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

// ── BY PHASE VIEW ─────────────────────────────────────────────
function ByPhaseView({ deps, allDeps, ownerMode, density, onEdit, onDelete, onView }) {
  const [expanded, setExpanded] = useState(null);
  return (
    <div style={{ padding:'24px', display:'flex', flexDirection:'column', gap:16 }}>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:14 }}>
        {PHASES.map((phase, idx) => {
          const all  = allDeps.filter(d => d.phase === phase.id);
          const open = all.filter(d => d.status !== 'Resolved').length;
          const res  = all.filter(d => d.status === 'Resolved').length;
          const over = all.filter(d => isOverdue(d)).length;
          const pct  = all.length ? Math.round((res / all.length) * 100) : 0;
          const isExp = expanded === phase.id;
          const color = PHASE_COLORS[idx];
          return (
            <div key={phase.id} onClick={() => setExpanded(isExp ? null : phase.id)}
              style={{ background:'#fff', border:'1px solid var(--border-subtle)',
                borderTop:`3px solid ${color}`, cursor:'pointer', transition:'box-shadow 120ms' }}
              onMouseEnter={e => e.currentTarget.style.boxShadow = 'var(--shadow-sm)'}
              onMouseLeave={e => e.currentTarget.style.boxShadow = 'none'}>
              <div style={{ padding:'16px 18px' }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:12 }}>
                  <div>
                    <div style={{ fontFamily:'Manrope', fontSize:9, fontWeight:700, letterSpacing:'0.12em',
                      textTransform:'uppercase', color:'var(--fg-subtle)', marginBottom:4 }}>{phase.id}</div>
                    <div style={{ fontFamily:'Manrope', fontWeight:700, fontSize:13, lineHeight:1.35, maxWidth:200 }}>
                      {phase.name}
                    </div>
                  </div>
                  <Icon name={isExp ? 'chevDown' : 'chevRight'} size={15} color="var(--fg-subtle)" />
                </div>
                <div style={{ display:'flex', gap:18, marginBottom:12, flexWrap:'wrap' }}>
                  {[
                    { v:open, label:'OPEN',     c:'var(--fg-default)' },
                    { v:res,  label:'RESOLVED', c:'var(--secil-green)' },
                    ...(over > 0 ? [{ v:over, label:'OVERDUE', c:'var(--secil-red)' }] : []),
                  ].map(({ v, label, c }) => (
                    <div key={label}>
                      <div style={{ fontFamily:'Manrope', fontWeight:800, fontSize:26, lineHeight:1,
                        letterSpacing:'-0.02em', color:c }}>{v}</div>
                      <div style={{ fontSize:9, color:'var(--fg-subtle)', marginTop:2,
                        letterSpacing:'0.08em', fontWeight:600 }}>{label}</div>
                    </div>
                  ))}
                </div>
                <div style={{ height:3, background:'var(--bg-muted)', borderRadius:2, overflow:'hidden' }}>
                  <div style={{ height:'100%', width:`${pct}%`, background:'var(--secil-green)',
                    transition:'width 340ms var(--ease-out)' }} />
                </div>
                <div style={{ fontSize:10, color:'var(--fg-subtle)', marginTop:4 }}>
                  {pct}% resolved · {all.length} total
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {expanded && (() => {
        const phase = PHASES.find(p => p.id === expanded);
        const phaseDeps = deps.filter(d => d.phase === expanded);
        return (
          <div style={{ background:'#fff', border:'1px solid var(--border-subtle)', animation:'fadeUp 200ms var(--ease-out) both' }}>
            <div style={{ padding:'13px 18px', borderBottom:'1px solid var(--border-subtle)',
              display:'flex', alignItems:'center', gap:10 }}>
              <PhaseBadge phase={expanded} />
              <span style={{ fontFamily:'Manrope', fontWeight:700, fontSize:14 }}>{phase.name}</span>
              <span style={{ fontSize:12, color:'var(--fg-subtle)', marginLeft:'auto' }}>
                {phaseDeps.length} {phaseDeps.length === 1 ? 'dependency' : 'dependencies'}
              </span>
            </div>
            <DepTable deps={phaseDeps} ownerMode={ownerMode} density={density} onEdit={onEdit} onDelete={onDelete} onView={onView} />
          </div>
        );
      })()}
    </div>
  );
}

// ── BY TEAM VIEW ──────────────────────────────────────────────
function ByTeamView({ deps, allDeps, ownerMode, density, onEdit, onDelete, onView }) {
  const [expanded, setExpanded] = useState(null);
  const teams = useMemo(() => {
    const set = new Set();
    allDeps.forEach(d => { set.add(d.blockedTeam); set.add(d.blockingTeam); });
    return [...set].sort();
  }, [allDeps]);

  return (
    <div style={{ padding:'24px', display:'flex', flexDirection:'column', gap:10 }}>
      {teams.map(team => {
        const blocking    = deps.filter(d => d.blockingTeam === team);
        const blocked     = deps.filter(d => d.blockedTeam  === team);
        const openBlock   = blocking.filter(d => d.status !== 'Resolved').length;
        const openBlocked = blocked.filter(d => d.status !== 'Resolved').length;
        const total       = blocking.length + blocked.length;
        if (total === 0) return null;
        const isExp = expanded === team;
        return (
          <div key={team} style={{ background:'#fff', border:'1px solid var(--border-subtle)' }}>
            <div style={{ padding:'13px 18px', display:'flex', alignItems:'center', gap:12,
              cursor:'pointer', transition:'background 120ms' }}
              onClick={() => setExpanded(isExp ? null : team)}
              onMouseEnter={e => e.currentTarget.style.background = 'var(--neutral-50)'}
              onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
              <span style={{ fontFamily:'Manrope', fontWeight:700, fontSize:14, flex:1 }}>{team}</span>
              <div style={{ display:'flex', gap:14, alignItems:'center' }}>
                {openBlock > 0 && (
                  <span style={{ display:'inline-flex', alignItems:'center', gap:5, fontSize:12,
                    color:'var(--secil-red)', fontWeight:600 }}>
                    <Icon name="alert" size={13} color="currentColor" />
                    Causing {openBlock} open block{openBlock > 1 ? 's' : ''}
                  </span>
                )}
                {openBlocked > 0 && (
                  <span style={{ fontSize:12, color:'var(--fg-muted)', fontWeight:500 }}>
                    Blocked: {openBlocked} open
                  </span>
                )}
                <span style={{ fontFamily:'JetBrains Mono', fontSize:11, color:'var(--fg-subtle)',
                  fontVariantNumeric:'tabular-nums' }}>{total}</span>
              </div>
              <Icon name={isExp ? 'chevDown' : 'chevRight'} size={15} color="var(--fg-subtle)" />
            </div>
            {isExp && (
              <div style={{ borderTop:'1px solid var(--border-subtle)', animation:'fadeUp 180ms var(--ease-out) both' }}>
                {blocking.length > 0 && (
                  <>
                    <div style={{ padding:'8px 18px', background:'rgba(192,57,43,0.04)',
                      borderBottom:'1px solid var(--border-subtle)', fontSize:10, fontWeight:700,
                      letterSpacing:'0.10em', textTransform:'uppercase', color:'#922B21',
                      display:'flex', alignItems:'center', gap:6 }}>
                      <Icon name="alert" size={12} color="currentColor" />
                      Causing blocks ({blocking.length})
                    </div>
                    <DepTable deps={blocking} ownerMode={ownerMode} density={density} onEdit={onEdit} onDelete={onDelete} onView={onView} />
                  </>
                )}
                {blocked.length > 0 && (
                  <>
                    <div style={{ padding:'8px 18px', background:'rgba(68,163,186,0.05)',
                      borderBottom:'1px solid var(--border-subtle)',
                      borderTop: blocking.length > 0 ? '1px solid var(--border-subtle)' : 'none',
                      fontSize:10, fontWeight:700, letterSpacing:'0.10em',
                      textTransform:'uppercase', color:'#1F6E82',
                      display:'flex', alignItems:'center', gap:6 }}>
                      <Icon name="link" size={12} color="currentColor" />
                      Being blocked ({blocked.length})
                    </div>
                    <DepTable deps={blocked} ownerMode={ownerMode} density={density} onEdit={onEdit} onDelete={onDelete} onView={onView} />
                  </>
                )}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── DETAIL DRAWER ─────────────────────────────────────────────
function DepDetail({ dep, ownerMode, onClose, onEdit, onDelete }) {
  useEffect(() => {
    const h = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [onClose]);

  const overdue = isOverdue(dep);
  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(36,45,49,0.38)',

        display:'flex', flexDirection:'column' }}>
        <div style={{ padding:'18px 24px', borderBottom:'1px solid var(--border-subtle)',
          display:'flex', alignItems:'flex-start', gap:12 }}>
          <div style={{ flex:1 }}>
            <div style={{ display:'flex', gap:8, marginBottom:8, flexWrap:'wrap' }}>

              <PhaseBadge phase={dep.phase} />
              <PriorityBadge priority={dep.priority} />
              <StatusBadge status={dep.status} />

          <button className="btn-ic" onClick={onClose} style={{ color:'var(--fg-subtle)', marginTop:2 }}>
            <Icon name="x" size={18} color="currentColor" />
          </button>
        </div>
        <div style={{ padding:'22px 24px', display:'flex', flexDirection:'column', gap:20, flex:1 }}>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 }}>
            <div>
              <div style={{ fontSize:10, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase',
                color:'var(--fg-subtle)', marginBottom:6 }}>Blocked Team</div>
              <div style={{ fontWeight:600 }}>{dep.blockedTeam}</div>

            <div>

              <div style={{ fontWeight:600 }}>{dep.blockingTeam}</div>

          </div>

            <div style={{ fontSize:10, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase',

              background:'#fff', color:'var(--fg-default)', fontFamily:'Inter', fontWeight:600,
              fontSize:13, cursor:'pointer', borderRadius:2, display:'flex', alignItems:'center',
              justifyContent:'center', gap:6 }}>

// ── MODAL ─────────────────────────────────────────────────────
function DepModal({ dep, onClose, onSave }) {
  const isNew = !dep.id;
  const [form, setForm] = useState({
    id:           dep.id           || '',
    blockedTask:  dep.blockedTask  || '',
    blockedTeam:  dep.blockedTeam  || '',
    blockingTask: dep.blockingTask || '',
    blockingTeam: dep.blockingTeam || '',
    phase:        dep.phase        || 'P1',
    priority:     dep.priority     || 'Medium',
    status:       dep.status       || 'Open',
    dueDate:      dep.dueDate      || '',
    notes:        dep.notes        || '',
  });
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const valid = form.blockedTask.trim() && form.blockingTask.trim() && form.blockedTeam.trim() && form.blockingTeam.trim();

  useEffect(() => {
    const h = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [onClose]);

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(36,45,49,0.45)',
      display:'flex', alignItems:'center', justifyContent:'center', zIndex:1000, padding:20 }}
      onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ background:'#fff', width:'100%', maxWidth:640, maxHeight:'90vh',
        overflowY:'auto', boxShadow:'var(--shadow-lg)', animation:'fadeUp 200ms var(--ease-out) both' }}>
        <div style={{ padding:'18px 24px', borderBottom:'1px solid var(--border-subtle)',
          display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div style={{ fontFamily:'Manrope', fontWeight:800, fontSize:16 }}>
            {isNew ? 'Add Dependency' : `Edit ${dep.id}`}
          </div>
          <button className="btn-ic" onClick={onClose} style={{ color:'var(--fg-subtle)' }}>
            <Icon name="x" size={18} color="currentColor" />
          </button>
        </div>
        <div style={{ padding:'24px', display:'flex', flexDirection:'column', gap:18 }}>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 180px', gap:14 }}>
            <div className="ff">
              <label>Blocked Task *</label>
              <input value={form.blockedTask} onChange={e => set('blockedTask', e.target.value)} placeholder="Task waiting on the blocker…" />
            </div>
            <div className="ff">
              <label>Blocked Team *</label>
              <input value={form.blockedTeam} onChange={e => set('blockedTeam', e.target.value)} placeholder="Team / Dept" />
            </div>
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 180px', gap:14 }}>
            <div className="ff">
              <label>Blocking Task *</label>
              <input value={form.blockingTask} onChange={e => set('blockingTask', e.target.value)} placeholder="Task that must happen first…" />
            </div>
            <div className="ff">
              <label>Blocking Team *</label>
              <input value={form.blockingTeam} onChange={e => set('blockingTeam', e.target.value)} placeholder="Team / Dept" />
            </div>
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr', gap:14 }}>
            <div className="ff">
              <label>Phase</label>
              <select value={form.phase} onChange={e => set('phase', e.target.value)}>
                {PHASES.map(p => <option key={p.id} value={p.id}>{p.id} — {p.short}</option>)}
              </select>
            </div>
            <div className="ff">
              <label>Priority</label>
              <select value={form.priority} onChange={e => set('priority', e.target.value)}>
                {PRIORITIES.map(p => <option key={p}>{p}</option>)}
              </select>
            </div>
            <div className="ff">
              <label>Status</label>
              <select value={form.status} onChange={e => set('status', e.target.value)}>
                {STATUSES.map(s => <option key={s}>{s}</option>)}
              </select>
            </div>
            <div className="ff">
              <label>Due Date</label>
              <input type="date" value={form.dueDate} onChange={e => set('dueDate', e.target.value)} />
            </div>
          </div>
          <div className="ff">
            <label>Notes</label>
            <textarea value={form.notes} onChange={e => set('notes', e.target.value)} placeholder="Context, links, decisions…" />
          </div>
        </div>
        <div style={{ padding:'16px 24px', borderTop:'1px solid var(--border-subtle)',
          display:'flex', justifyContent:'flex-end', gap:10 }}>
          <button onClick={onClose} style={{ padding:'8px 18px', border:'1px solid var(--border-default)',
            background:'#fff', color:'var(--fg-default)', borderRadius:2, fontFamily:'Inter',
            fontWeight:600, fontSize:13, cursor:'pointer' }}>Cancel</button>
          <button onClick={() => valid && onSave(form)} disabled={!valid} style={{
            padding:'8px 20px', border:'1px solid transparent',
            background: valid ? 'var(--secil-yellow)' : 'var(--neutral-200)',
            color: valid ? 'var(--secil-charcoal)' : 'var(--fg-disabled)',
            borderRadius:2, fontFamily:'Inter', fontWeight:700, fontSize:13,
            cursor: valid ? 'pointer' : 'not-allowed' }}>
            {isNew ? 'Add Dependency' : 'Save Changes'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── TOAST ─────────────────────────────────────────────────────
function Toast({ msg, onHide }) {
  useEffect(() => {
    if (!msg) return;
    const t = setTimeout(onHide, 2600);
    return () => clearTimeout(t);
  }, [msg, onHide]);
  return (
    <div style={{ position:'fixed', bottom:24, right:24, background:'var(--secil-charcoal)',
      color:'#fff', padding:'11px 18px', fontSize:13, fontWeight:500,
      borderLeft:'3px solid var(--secil-yellow)', boxShadow:'var(--shadow-md)',
      opacity: msg ? 1 : 0, transform: msg ? 'none' : 'translateY(6px)',
      transition:'opacity 200ms, transform 200ms', pointerEvents:'none', zIndex:2000 }}>
      {msg}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────
function App() {
  const [deps, setDeps]       = useState([]);
  const [loading, setLoading] = useState(true);
  const [view, setView]       = useState('all');
  const [filters, setFilters] = useState({ search:'', phase:'', status:'', priority:'', hideResolved:false });
  const [modal,   setModal]   = useState(null);
  const [detail,  setDetail]  = useState(null);
  const [toast,   setToast]   = useState('');
  const [ownerMode, setOwnerMode]   = useState(true);
  const [density,   setDensity]     = useState('comfortable');
  const [tweaksOpen, setTweaksOpen] = useState(false);

  // Load from dependencies.json (GitHub Pages), fall back to localStorage
  useEffect(() => {
    async function load() {
      try {
        const r = await fetch('dependencies.json?t=' + Date.now());
        if (r.ok) { setDeps(await r.json()); setLoading(false); return; }
      } catch {}
      try {
        const s = localStorage.getItem('q2d-deps');
        if (s) setDeps(JSON.parse(s));
      } catch {}
      setLoading(false);
    }
    load();
  }, []);

  // Cache to localStorage on every change
  useEffect(() => {
    if (!loading) {
      try { localStorage.setItem('q2d-deps', JSON.stringify(deps)); } catch {}
    }
  }, [deps, loading]);

  const setFilter = (k, v) => setFilters(f => ({ ...f, [k]: v }));
  const showToast = msg => setToast(msg);

  const filteredDeps = useMemo(() => applyFilters(deps, filters), [deps, filters]);
  const crossDeps    = useMemo(() => applyFilters(deps, { ...filters, phase:'' }), [deps, filters]);

  const handleAdd    = () => { setDetail(null); setModal({ dep:{} }); };
  const handleEdit   = dep => { setDetail(null); setModal({ dep }); };
  const handleView   = dep => setDetail(dep);

  const handleDelete = id => {
    if (!window.confirm('Delete this dependency?')) return;
    setDeps(d => d.filter(x => x.id !== id));
    showToast('Dependency deleted.');
  };

  const handleSave = form => {
    const isNew = !form.id;
    const saved = { ...form, id: form.id || nextId(deps) };
    setDeps(d => isNew ? [...d, saved] : d.map(x => x.id === saved.id ? saved : x));
    showToast(isNew ? `${saved.id} added.` : `${saved.id} updated.`);
    setModal(null);
  };

  const handleExport = () => {
    const blob = new Blob([JSON.stringify(deps, null, 2)], { type:'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `dependencies.json`;
    a.click();
    showToast('JSON exported — commit this file to publish changes.');
  };

  const handleImport = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
      try {
        const data = JSON.parse(evt.target.result);
        if (!Array.isArray(data)) throw new Error();
        setDeps(data);
        showToast(`Imported ${data.length} dependencies.`);
      } catch { showToast('Error: invalid JSON file.'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const kpis = [
    { label:'Open',           v: deps.filter(d => d.status !== 'Resolved').length,                            c:'var(--fg-default)' },
    { label:'Critical (open)',v: deps.filter(d => d.priority === 'Critical' && d.status !== 'Resolved').length, c:'var(--secil-red)' },
    { label:'Overdue',        v: deps.filter(d => isOverdue(d)).length,                                        c:'var(--secil-red)' },
    { label:'Resolved',       v: deps.filter(d => d.status === 'Resolved').length,                             c:'var(--secil-green)' },
    { label:'Total',          v: deps.length,                                                                   c:'var(--fg-muted)' },
  ];

  const viewLabel = { all:'All Dependencies', phase:'By Phase', team:'By Team' }[view];

  if (loading) {
    return (
      <div style={{ display:'flex', alignItems:'center', justifyContent:'center', height:'100vh',
        fontFamily:'Manrope', fontSize:14, color:'var(--fg-subtle)' }}>
        Loading…
      </div>
    );
  }

  return (
    <div style={{ display:'flex', height:'100vh', overflow:'hidden' }}>
      <Sidebar view={view} onView={setView} />
      <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0, overflow:'hidden' }}>
        {/* KPI strip */}
        <div style={{ display:'flex', borderBottom:'1px solid var(--border-subtle)', background:'#fff', flexShrink:0, overflowX:'auto' }}>
          {kpis.map(kpi => (
            <div key={kpi.label} style={{ padding:'10px 22px', borderRight:'1px solid var(--border-subtle)',
              display:'flex', flexDirection:'column', gap:1, flexShrink:0 }}>
              <span style={{ fontSize:9, fontWeight:700, letterSpacing:'0.12em',
                textTransform:'uppercase', color:'var(--fg-subtle)' }}>{kpi.label}</span>
              <span style={{ fontFamily:'Manrope', fontWeight:800, fontSize:22, lineHeight:1,
                letterSpacing:'-0.02em', color:kpi.c, fontVariantNumeric:'tabular-nums' }}>{kpi.v}</span>
            </div>
          ))}
          <div style={{ marginLeft:'auto', padding:'10px 22px', display:'flex', alignItems:'center', gap:12 }}>
            <span style={{ fontFamily:'Manrope', fontWeight:700, fontSize:13,
              color:'var(--fg-default)', letterSpacing:'-0.01em' }}>{viewLabel}</span>
            {filteredDeps.length !== deps.length && (
              <span style={{ fontSize:11, color:'var(--fg-subtle)' }}>· showing {filteredDeps.length}</span>
            )}
            <button onClick={() => setTweaksOpen(t => !t)} style={{
              display:'inline-flex', alignItems:'center', gap:5, padding:'5px 10px',
              border:'1px solid var(--border-default)', background:'#fff', borderRadius:2,
              fontSize:11, fontFamily:'Inter', fontWeight:600, cursor:'pointer', color:'var(--fg-muted)' }}>
              ⚙ Tweaks
            </button>
          </div>
        </div>

        <TopBar filters={filters} onFilter={setFilter} ownerMode={ownerMode}
          onAdd={handleAdd} onExport={handleExport} onImport={handleImport} />

        <div style={{ flex:1, overflow:'auto', minHeight:0 }}>
          {view === 'all' && (
            <DepTable deps={filteredDeps} ownerMode={ownerMode} density={density}
              onEdit={handleEdit} onDelete={handleDelete} onView={handleView} />
          )}
          {view === 'phase' && (
            <ByPhaseView deps={crossDeps} allDeps={deps} ownerMode={ownerMode} density={density}
              onEdit={handleEdit} onDelete={handleDelete} onView={handleView} />
          )}
          {view === 'team' && (
            <ByTeamView deps={crossDeps} allDeps={deps} ownerMode={ownerMode} density={density}
              onEdit={handleEdit} onDelete={handleDelete} onView={handleView} />
          )}
        </div>
      </div>

      {detail && (
        <DepDetail dep={detail} ownerMode={ownerMode}
          onClose={() => setDetail(null)}
          onEdit={dep => { setDetail(null); handleEdit(dep); }}
          onDelete={id => { handleDelete(id); setDetail(null); }} />
      )}
      {modal && <DepModal dep={modal.dep} onClose={() => setModal(null)} onSave={handleSave} />}
      <Toast msg={toast} onHide={() => setToast('')} />

      {tweaksOpen && (
        <div style={{ position:'fixed', bottom:24, right:24, width:268,
          background:'#fff', border:'1px solid var(--border-default)',
          boxShadow:'var(--shadow-lg)', zIndex:500, animation:'fadeUp 180ms var(--ease-out) both' }}>
          <div style={{ padding:'13px 16px', borderBottom:'1px solid var(--border-subtle)',
            display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <span style={{ fontFamily:'Manrope', fontWeight:700, fontSize:13 }}>Tweaks</span>
            <button className="btn-ic" onClick={() => setTweaksOpen(false)} style={{ color:'var(--fg-subtle)' }}>
              <Icon name="x" size={16} color="currentColor" />
            </button>
          </div>
          <div style={{ padding:'16px', display:'flex', flexDirection:'column', gap:16 }}>
            <label style={{ display:'flex', justifyContent:'space-between', alignItems:'center', cursor:'pointer', gap:12 }}>
              <div>
                <div style={{ fontSize:13, fontWeight:600 }}>Owner mode</div>
                <div style={{ fontSize:11, color:'var(--fg-subtle)', marginTop:2 }}>Show add / edit / delete controls</div>
              </div>
              <input type="checkbox" checked={ownerMode} onChange={e => setOwnerMode(e.target.checked)}
                style={{ width:15, height:15, cursor:'pointer', accentColor:'var(--secil-yellow)', flexShrink:0 }} />
            </label>
            <div style={{ height:1, background:'var(--border-subtle)' }} />
            <div>
              <div style={{ fontSize:10, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase',
                color:'var(--fg-muted)', marginBottom:8 }}>Row density</div>
              <div style={{ display:'flex', gap:0, border:'1px solid var(--border-default)', borderRadius:2, overflow:'hidden' }}>
                {['comfortable','compact'].map(d => (
                  <button key={d} onClick={() => setDensity(d)} style={{
                    flex:1, padding:'6px', border:'none', fontFamily:'Inter', fontSize:12,
                    fontWeight:600, cursor:'pointer', textTransform:'capitalize',
                    background: density === d ? 'var(--secil-charcoal)' : '#fff',
                    color: density === d ? '#fff' : 'var(--fg-muted)',
                    transition:'background 120ms' }}>
                    {d}
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const extraStyles = document.createElement('style');
extraStyles.textContent = `@keyframes slideInRight{from{transform:translateX(40px);opacity:0}to{transform:none;opacity:1}}`;
document.head.appendChild(extraStyles);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
